<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMRC Operations Control | Application Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <link rel="stylesheet" href="styles.css">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="app.js"></script>
    
    <style>
        .drawer-timeline { border-left: 2px solid var(--border-light); margin-left: 12px; padding-left: 20px; position: relative; }
        .drawer-timeline-item { position: relative; margin-bottom: 20px; }
        .drawer-timeline-item::before { content: ''; position: absolute; left: -27px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background-color: var(--dmrc-blue); border: 2px solid #fff; }
        .drawer-timeline-item:last-child { margin-bottom: 0; }
        .drawer-timeline-date { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .drawer-timeline-title { font-size: 0.88rem; font-weight: 700; color: var(--text-main); margin: 2px 0; }
        .drawer-timeline-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin: 0; }
        
        .dash-nav-link { color: var(--text-muted); font-weight: 600; padding: 12px 20px; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s; }
        .dash-nav-link:hover { color: var(--dmrc-blue); }
        .dash-nav-link.active { color: var(--dmrc-blue); border-bottom-color: var(--dmrc-blue); }
    </style>
</head>
<body x-data="wizardEngine">

    <!-- Header (Full Edge-to-Edge Fluid Design) -->
    <header class="py-3 bg-white border-bottom shadow-sm">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <img src="dmrc-logo.png" alt="DMRC logo" class="brand-logo" style="flex-shrink: 0;">
                <div style="line-height: 1.1;">
                    <span class="fs-5 fw-bold" style="color: var(--dmrc-blue) !important; font-family: var(--font-display);">DMRC</span><br>
                    <span class="text-muted" style="font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Intern Referral Portal</span>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2 bg-light px-3 py-1 rounded border">
                <i class="bi bi-person-badge text-secondary"></i>
                <div class="text-end" style="line-height: 1.2;">
                    <div class="fw-bold small" x-text="sessionEmployee.name"></div>
                    <div class="text-muted" style="font-size: 0.7rem;" x-text="sessionEmployee.department + ' · ' + sessionEmployee.empId"></div>
                </div>
            </div>
        </div>
    </header>

    <template x-if="portalState === 'dashboard'">
        <div class="container-xl py-5" x-transition>
            <div class="d-flex flex-wrap justify-content-between align-items-end mb-4 gap-3">
                <div>
                    <h1 class="h3 fw-bold mb-2" style="font-family: var(--font-display);">My Referrals</h1>
                    <p class="text-muted mb-0">Manage your candidate applications and track HR verification statuses.</p>
                </div>
                <button type="button" class="btn btn-dmrc-primary px-4 py-2 fw-bold shadow-sm" @click="startNewApplication()">
                    <i class="bi bi-plus-lg me-2"></i> Start New Referral
                </button>
            </div>

            <!-- KPI Ribbon -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; background-color: var(--dmrc-blue-soft); color: var(--dmrc-blue);">
                            <i class="bi bi-folder-check fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted fw-bold" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;">Total Submitted</div>
                            <div class="fs-4 fw-bold" x-text="mockApplications.filter(a => a.tab === 'submitted').length"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; background-color: #F8FAFC; color: #64748B;">
                            <i class="bi bi-pencil-square fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted fw-bold" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;">Active Drafts</div>
                            <div class="fs-4 fw-bold" x-text="mockApplications.filter(a => a.tab === 'saved').length"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger" style="width: 48px; height: 48px;">
                            <i class="bi bi-exclamation-octagon fs-4"></i>
                        </div>
                        <div>
                            <div class="text-danger fw-bold" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;">Action Required</div>
                            <div class="fs-4 fw-bold text-danger" x-text="mockApplications.filter(a => a.tab === 'reopened').length"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Table Matrix -->
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
                
                <div class="d-flex flex-wrap border-bottom bg-light px-3 pt-2 align-items-center justify-content-between gap-3">
                    <div class="d-flex">
                        <div class="dash-nav-link" :class="activeTab === 'submitted' ? 'active' : ''" @click="activeTab = 'submitted'; searchQuery = '';">
                            Submitted <span class="badge bg-secondary ms-1 rounded-pill" x-text="mockApplications.filter(a => a.tab === 'submitted').length"></span>
                        </div>
                        <div class="dash-nav-link" :class="activeTab === 'reopened' ? 'active' : ''" @click="activeTab = 'reopened'; searchQuery = '';">
                            Re-Opened <span class="badge bg-danger ms-1 rounded-pill" x-show="mockApplications.filter(a => a.tab === 'reopened').length > 0" x-text="mockApplications.filter(a => a.tab === 'reopened').length"></span>
                        </div>
                        <div class="dash-nav-link" :class="activeTab === 'saved' ? 'active' : ''" @click="activeTab = 'saved'; searchQuery = '';">
                            Saved Drafts <span class="badge bg-secondary ms-1 rounded-pill" x-text="mockApplications.filter(a => a.tab === 'saved').length"></span>
                        </div>
                    </div>
                    
                    <!-- Search Engine -->
                    <div class="pb-2">
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Search Name or Ticket ID..." x-model="searchQuery">
                        </div>
                    </div>
                </div>

                <div class="p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" style="font-size: 0.88rem;">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-muted fw-bold py-3 ps-4" style="font-size: 0.75rem; text-transform: uppercase;">Candidate</th>
                                    <th class="text-muted fw-bold py-3" style="font-size: 0.75rem; text-transform: uppercase;">Ticket ID / Dept</th>
                                    <th class="text-muted fw-bold py-3" style="font-size: 0.75rem; text-transform: uppercase;">Date</th>
                                    <th class="text-muted fw-bold py-3" style="font-size: 0.75rem; text-transform: uppercase;">Status</th>
                                    <th class="text-muted fw-bold py-3 text-end pe-4" style="font-size: 0.75rem; text-transform: uppercase;">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- SUBMITTED TAB -->
                                <template x-if="activeTab === 'submitted'">
                                    <template x-for="app in submittedApps" :key="app.id">
                                        <tr>
                                            <td class="ps-4 py-3">
                                                <div class="fw-bold text-dark" x-text="app.student.fullName"></div>
                                                <div class="text-muted" style="font-size: 0.75rem;" x-text="app.targetCycle"></div>
                                            </td>
                                            <td>
                                                <div class="fw-bold" style="font-family: var(--font-display); color: var(--dmrc-blue);" x-text="app.ticketId"></div>
                                                <div class="text-muted" style="font-size: 0.75rem;" x-text="'Dept: ' + app.dept"></div>
                                            </td>
                                            <td><div class="fw-medium text-dark" x-text="app.createdDate"></div></td>
                                            <td>
                                                <span class="badge" :class="app.badge" style="padding: 6px 10px;" x-text="app.dbStatus || app.status"></span>
                                                <!-- Universal Resubmitted Historical Badge -->
                                                <template x-if="app.timeline && app.timeline.some(e => e.title.includes('Resubmitted'))">
                                                    <div class="mt-1">
                                                        <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25" style="font-size: 0.65rem;">
                                                            <i class="bi bi-arrow-repeat me-1"></i>Resubmitted
                                                        </span>
                                                    </div>
                                                </template>
                                            </td>
                                            <td class="text-end pe-4">
                                                <button type="button" class="btn btn-sm btn-outline-primary fw-bold" @click="viewTicket(app)">
                                                    <i class="bi bi-eye-fill me-1"></i> View
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                                <template x-if="activeTab === 'submitted' && submittedApps.length === 0">
                                    <tr><td colspan="5" class="text-center py-5 text-muted">No applications match your search.</td></tr>
                                </template>

                                <!-- RE-OPENED TAB -->
                                <template x-if="activeTab === 'reopened'">
                                    <template x-for="app in reopenedApps" :key="app.id">
                                        <tr>
                                            <td class="ps-4 py-3">
                                                <div class="fw-bold text-dark" x-text="app.student.fullName"></div>
                                                <div class="text-muted" style="font-size: 0.75rem;" x-text="app.targetCycle"></div>
                                            </td>
                                            <td>
                                                <div class="fw-bold" style="font-family: var(--font-display); color: var(--dmrc-crimson);" x-text="app.ticketId"></div>
                                                <div class="text-muted text-truncate" style="font-size: 0.75rem; max-width: 200px;" x-text="app.remarks" :title="app.remarks"></div>
                                            </td>
                                            <td><div class="fw-medium text-dark" x-text="app.createdDate"></div></td>
                                            <td><span class="badge" :class="app.badge" style="padding: 6px 10px;"><i class="bi bi-exclamation-circle me-1"></i> Action Required</span></td>
                                            <td class="text-end pe-4">
                                                <button type="button" class="btn btn-sm btn-danger fw-bold" @click="fixApplication(app)">
                                                    <i class="bi bi-wrench me-1"></i> Fix App
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                                <template x-if="activeTab === 'reopened' && reopenedApps.length === 0">
                                    <tr><td colspan="5" class="text-center py-5 text-muted">No applications match your search.</td></tr>
                                </template>

                                <!-- SAVED TAB -->
                                <template x-if="activeTab === 'saved'">
                                    <template x-for="app in savedApps" :key="app.id">
                                        <tr>
                                            <td class="ps-4 py-3">
                                                <div class="fw-bold text-dark" x-text="app.student.fullName || '—'"></div>
                                                <div class="text-muted" style="font-size: 0.75rem;" x-text="app.targetCycle"></div>
                                            </td>
                                            <td>
                                                <div class="text-muted fst-italic" style="font-size: 0.8rem;">Pending Issue</div>
                                            </td>
                                            <td><div class="fw-medium text-dark" x-text="app.createdDate"></div></td>
                                            <td><span class="badge" :class="app.badge" style="padding: 6px 10px;">Draft</span></td>
                                            <td class="text-end pe-4">
                                                <button type="button" class="btn btn-sm btn-secondary fw-bold" @click="resumeDraft(app)">
                                                    <i class="bi bi-play-fill me-1"></i> Resume
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                                <template x-if="activeTab === 'saved' && savedApps.length === 0">
                                    <tr><td colspan="5" class="text-center py-5 text-muted">No drafts match your search.</td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template x-if="portalState === 'cycle_select'">
        <div class="container-xl py-4" x-transition>
            <!-- Upgraded Navigation Button Layout -->
            <button type="button" class="btn btn-outline-secondary btn-sm fw-bold px-3 py-2 mb-4 d-inline-flex align-items-center gap-1 shadow-sm" @click="returnToDashboard()">
                <i class="bi bi-arrow-left"></i> Return to Dashboard
            </button>

            <div class="text-center mb-5 mt-2">
                <h1 class="h3 fw-bold mb-2" style="font-family: var(--font-display);">Select Internship Term</h1>
                <p class="text-muted mx-auto" style="max-width: 500px;">Please choose an active cycle below to start the referral application process.</p>
            </div>

            <div class="row g-4 justify-content-center mx-auto" style="max-width: 750px;">
                <div class="col-md-6">
                    <div class="card p-4 rounded-4 text-center option-selection-card" :class="placement.cycle_id === 1 ? 'selected-active' : ''" @click="confirmCycleSelection('Summer', 1)">
                        <div class="fs-1 text-warning mb-2"><i class="bi bi-sun-fill"></i></div>
                        <h2 class="h5 fw-bold mb-1">Summer 2026</h2>
                        <span class="badge bg-light text-muted border px-3 py-2 mt-2 rounded-pill fw-semibold tracking-badge">Timeline: May - July</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-4 rounded-4 text-center option-selection-card" :class="placement.cycle_id === 2 ? 'selected-active' : ''" @click="confirmCycleSelection('Winter', 2)">
                        <div class="fs-1 text-primary mb-2 color-icon"><i class="bi bi-snow2"></i></div>
                        <h2 class="h5 fw-bold mb-1">Winter 2026</h2>
                        <span class="badge bg-light text-muted border px-3 py-2 mt-2 rounded-pill fw-semibold tracking-badge">Timeline: December - January</span>
                    </div>
                </div>
            </div>

            <!-- Streamlined Cycle Capacity Table with Real-time Countdown and Inline Badges -->
            <div x-show="placement.cycle_id" id="capacityTableSection" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 transform translate-x-4" x-transition:enter-end="opacity-100 transform translate-x-0" class="mt-5 mx-auto" style="max-width: 750px; display: none;">
                <h3 class="h6 fw-bold mb-2 text-dark"><i class="bi bi-graph-up-arrow me-2 text-primary"></i>Global Availability Status</h3>
                <p class="text-muted mb-3" style="font-size: 0.75rem; line-height: 1.4;"><strong>Note:</strong> Availability reflects total organizational allocations. The 'My Referrals' tab on your dashboard only displays applications submitted under your specific employee profile authorization.</p>
                
                <div class="table-responsive card border-0 shadow-sm rounded-4 overflow-hidden mb-5">
                    <table class="table table-hover align-middle mb-0 text-center" style="font-size: 0.85rem;">
                        <thead class="table-light">
                            <tr>
                                <th class="text-start ps-4 text-muted fw-bold text-uppercase py-3" style="font-size: 0.72rem;">Department Name</th>
                                <th class="text-muted fw-bold text-uppercase py-3" style="font-size: 0.72rem;">Max Program Seats</th>
                                <th class="text-muted fw-bold text-uppercase py-3" style="font-size: 0.72rem;">Current Availability</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="dept in dmrcDepartments" :key="dept">
                                <tr :class="(currentCycleCapacity[dept].max - currentCycleCapacity[dept].occ) <= 0 ? 'table-danger' : ''">
                                    <td class="text-start ps-4 fw-bold text-dark" x-text="dept"></td>
                                    <td class="fw-medium text-secondary" x-text="currentCycleCapacity[dept].max"></td>
                                    <td>
                                        <div class="d-flex align-items-center justify-content-center gap-2">
                                            <span class="fw-bold" :class="(currentCycleCapacity[dept].max - currentCycleCapacity[dept].occ) <= 0 ? 'text-danger' : 'text-success'" x-text="currentCycleCapacity[dept].max - currentCycleCapacity[dept].occ"></span>
                                            <template x-if="(currentCycleCapacity[dept].max - currentCycleCapacity[dept].occ) <= 0">
                                                <span class="badge bg-danger" style="font-size: 0.65rem; padding: 4px 8px;">Waitlist</span>
                                            </template>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <div class="text-center">
                    <button type="button" class="btn btn-dmrc-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold text-center" @click="initializeWizard()">
                        Begin Application <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="portalState === 'form_wizard'">
        <div>
            <!-- Modals -->
            <div x-show="showValidationWarning" class="position-fixed top-0 start-0 w-100 h-100" style="z-index: 1050; display: none;" x-transition.opacity>
                <div class="w-100 h-100 bg-dark bg-opacity-50 d-flex align-items-center justify-content-center">
                    <div class="card border-0 shadow-lg rounded-4 p-4 mx-3" style="max-width: 400px; width: 100%;" @click.outside="showValidationWarning = false">
                        <div class="text-center mb-3">
                            <div class="bg-warning bg-opacity-10 text-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;"><i class="bi bi-exclamation-triangle-fill fs-2"></i></div>
                            <h3 class="h5 fw-bold mb-2">Incomplete Fields Detected</h3>
                            <p class="text-muted small mb-0">You have left some mandatory fields blank. You can skip them for now, but you will need to complete them before final submission.</p>
                        </div>
                        <div class="d-flex gap-2 w-100 mt-4">
                            <button type="button" class="btn btn-outline-secondary w-50 fw-bold" @click="showValidationWarning = false">Stay & Fill</button>
                            <button type="button" class="btn btn-warning w-50 fw-bold text-dark" @click="proceedToNextStep()">Skip & Next</button>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="showSubmitConfirm" class="position-fixed top-0 start-0 w-100 h-100" style="z-index: 1060; display: none;" x-transition.opacity>
                <div class="w-100 h-100 bg-dark bg-opacity-50 d-flex align-items-center justify-content-center">
                    <div class="card border-0 shadow-lg rounded-4 p-4 mx-3" style="max-width: 420px; width: 100%;" @click.outside="showSubmitConfirm = false">
                        <div class="text-center mb-3">
                            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; background-color: var(--dmrc-blue-soft); color: var(--dmrc-blue);"><i class="bi bi-lock-fill fs-2"></i></div>
                            <h3 class="h5 fw-bold mb-2">Confirm Final Submission</h3>
                            <p class="text-muted small mb-0">This will permanently lock the application record for HR verification. No further edits will be possible after submission.</p>
                        </div>
                        <div class="d-flex gap-2 w-100 mt-4">
                            <button type="button" class="btn btn-outline-secondary w-50 fw-bold" @click="showSubmitConfirm = false">Go Back</button>
                            <button type="button" class="btn btn-dmrc-primary w-50 fw-bold" @click="submitApplication()">Confirm &amp; Submit</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Balanced Navigation Breadcrumb -->
            <div class="container-xl pt-4 pb-2" x-transition>
                <button type="button" class="btn btn-outline-secondary btn-sm fw-bold px-3 py-2 mb-2 d-inline-flex align-items-center gap-1 shadow-sm" @click="returnToDashboard()">
                    <i class="bi bi-arrow-left"></i> Return to Dashboard
                </button>
            </div>

            <nav class="bg-white border-bottom py-2 shadow-sm mb-4" x-transition>
                <div class="container-xl">
                    <div class="d-flex justify-content-between align-items-center overflow-x-auto flex-nowrap" style="gap: 1rem;">
                        <template x-for="i in totalSteps">
                            <button type="button" class="btn border-0 d-flex align-items-center gap-2 p-2 flex-shrink-0" @click="goToStep(i)" :disabled="i > highestStepReached" style="cursor: pointer; text-align: left; white-space: nowrap;">
                                <span class="step-circle d-flex align-items-center justify-content-center fw-bold flex-shrink-0" :class="currentStep === i ? 'is-active' : (currentStep > i ? 'is-complete' : 'is-pending')">
                                    <span x-show="currentStep <= i" x-text="i"></span><i x-show="currentStep > i" class="bi bi-check2"></i>
                                </span>
                                <div class="d-none d-sm-block" style="line-height: 1.1;">
                                    <span class="d-block fw-bold small text-capitalize" :class="currentStep === i ? 'step-label-active' : 'text-dark'" x-text="i === 1 ? 'Details' : (i === 2 ? 'Academic' : (i === 3 ? 'Documents' : (i === 4 ? 'Internship Details' : 'Review')))"></span>
                                    <span class="text-muted" style="font-size: 0.65rem;" x-text="i === 1 ? 'Bio Records' : (i === 2 ? 'Transcript' : (i === 3 ? 'Vault' : (i === 4 ? 'Parameters' : 'Submission')))"></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>
            </nav>

            <main class="container-xl pb-5">
                <div class="row g-4">
                    <div class="col-lg-8">
                        
                        <div x-show="isCorrectionMode" class="alert alert-danger border-danger shadow-sm rounded-4 mb-4" style="display: none;" x-transition>
                             <div class="d-flex gap-3 align-items-start">
                                 <i class="bi bi-exclamation-octagon-fill fs-3 text-danger"></i>
                                 <div>
                                    <h4 class="h6 fw-bold mb-1 text-danger">Action Required: Application Returned</h4>
                                    <p class="mb-0 small fw-medium" style="color: #842029;" x-text="correctionRemarks"></p>
                                </div>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                            <!-- STEP 1 -->
                            <div x-show="currentStep === 1" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform translate-x-4">
                                <div class="mb-4">
                                    <h2 class="h5 fw-bold mb-1">Student Details</h2>
                                    <p class="text-muted small">Enter the candidate's primary biographical parameters mapping strictly to your core database shape.</p>
                                </div>
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">Full Name<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="student.fullName" placeholder="As written on College ID card"></div>
                                    <div class="col-md-6"><label class="form-label">Father's Name<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="student.fathersName" placeholder="Father's complete name"></div>
                                    <div class="col-md-4"><label class="form-label">Gender<span class="text-danger">*</span></label><select class="form-select" x-model="student.gender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
                                    <div class="col-md-4"><label class="form-label">Date of Birth<span class="text-danger">*</span></label><input type="text" class="form-control bg-white" x-model="student.dateOfBirth" readonly x-init="flatpickr($el, { dateFormat: 'Y-m-d', altInput: true, altFormat: 'd-m-Y' })" placeholder="DD-MM-YYYY" style="cursor: pointer;"></div>
                                    <div class="col-md-4"><label class="form-label">Mobile Number<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="student.mobile_number" @input="restrictMobileInput('mobile_number', 'f_email')" :class="isMobileInvalid('mobile_number') ? 'is-invalid' : ''" placeholder="10-digit mobile number"></div>
                                    <div class="col-md-12"><label class="form-label">Email ID<span class="text-danger">*</span></label><input type="email" class="form-control" id="f_email" x-model="student.personal_email" :class="isEmailInvalid() ? 'is-invalid' : ''" placeholder="candidate@institution.edu"></div>
                                    <div class="col-md-12"><label class="form-label">Permanent Address<span class="text-danger">*</span></label><textarea class="form-control" rows="2" x-model="student.permanent_address" placeholder="Complete resident layout space"></textarea></div>
                                    <div class="divider-line"></div>
                                    <h3 class="h6 fw-bold text-secondary mb-1">Emergency Contact Parameters</h3>
                                    <div class="col-md-6"><label class="form-label">Emergency Contact Name<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="student.emergency_contact_name" placeholder="Contact person's full name"></div>
                                    <div class="col-md-6"><label class="form-label">Emergency Contact Mobile<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="student.emergency_contact_mobile" @input="restrictMobileInput('emergency_contact_mobile', null)" :class="isMobileInvalid('emergency_contact_mobile') ? 'is-invalid' : ''" placeholder="10-digit mobile matrix"></div>
                                </div>
                            </div>
                            <!-- STEP 2 -->
                            <div x-show="currentStep === 2" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform translate-x-4">
                                <div class="mb-4">
                                    <h2 class="h5 fw-bold mb-1">Academic &amp; Transcript Matrix</h2>
                                    <p class="text-muted small">Input educational history matching child table specifications.</p>
                                </div>
                                <div class="row g-3">
                                    <div class="col-md-12"><label class="form-label">University Name<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="academic.university_name" placeholder="Name of the governing University"></div>
                                    <div class="col-md-12"><label class="form-label">College / Institute Name<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="academic.college_name" placeholder="Name of the specific college or campus"></div>
                                    <div class="col-md-6">
                                        <label class="form-label">Course (Degree)<span class="text-danger">*</span></label>
                                        <select class="form-select" x-model="academic.course"><option value="">Select Degree</option><template x-for="course in courseOptions"><option :value="course" x-text="course"></option></template><option value="Other">Other (Please Specify)</option></select>
                                    </div>
                                    <div class="col-md-6" x-show="academic.course === 'Other'" x-transition><label class="form-label">Specify Custom Degree<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="academic.course_other" placeholder="Enter degree name"></div>
                                    <div class="col-md-6">
                                        <label class="form-label">Branch / Specialization<span class="text-danger">*</span></label>
                                        <select class="form-select" x-model="academic.branch"><option value="">Select Branch</option><template x-for="branch in branchOptions"><option :value="branch" x-text="branch"></option></template><option value="Other">Other (Please Specify)</option></select>
                                    </div>
                                    <div class="col-md-6" x-show="academic.branch === 'Other'" x-transition><label class="form-label">Specify Custom Branch<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="academic.branch_other" placeholder="Enter specialization name"></div>
                                    <div class="divider-line"></div>
                                    <h3 class="h6 fw-bold text-secondary mb-1">Current Academic Standing</h3>
                                    <div class="col-md-4">
                                        <label class="form-label">Current Semester<span class="text-danger">*</span></label>
                                        <select class="form-select" x-model="academic.current_semester"><option value="">Select</option><template x-for="sem in 10"><option :value="sem" x-text="'Semester ' + sem"></option></template><option value="Graduated">Graduated / Alumni</option></select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label d-block">Grading System<span class="text-danger">*</span></label>
                                        <div class="btn-group w-100" role="group">
                                            <input type="radio" class="btn-check" name="btnradio" id="grade1" autocomplete="off" value="CGPA" x-model="academic.grading_system" @change="academic.current_score = ''">
                                            <label class="btn btn-outline-primary" style="font-size: 0.85rem;" for="grade1">CGPA (10)</label>
                                            <input type="radio" class="btn-check" name="btnradio" id="grade2" autocomplete="off" value="Percentage" x-model="academic.grading_system" @change="academic.current_score = ''">
                                            <label class="btn btn-outline-primary" style="font-size: 0.85rem;" for="grade2">%</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4"><label class="form-label">Current Score<span class="text-danger">*</span></label><input type="text" class="form-control" x-model="academic.current_score" @input="restrictScoreInput()" :placeholder="academic.grading_system === 'CGPA' ? 'Max 10.00' : 'Max 100.00'"></div>
                                </div>
                            </div>
                            <!-- STEP 3 -->
                            <div x-show="currentStep === 3" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform translate-x-4">
                                <div class="mb-4">
                                    <h2 class="h5 fw-bold mb-1">Asset Management Vault</h2>
                                    <p class="text-muted small">Upload mandatory compliance documents. Max 5MB per file. You may upload these later before final submission.</p>
                                </div>
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="form-label">AADHAR<span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf" @change="handleFileUpload($event, 'aadhar')">
                                            <button type="button" class="btn btn-outline-primary px-3 flex-shrink-0" x-show="documents.aadhar" @click="previewDocument('aadhar')" title="Preview Document"><i class="bi bi-eye-fill"></i></button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-1">
                                            <div class="form-text mb-0" style="font-size: 0.72rem;">Max 5MB • Allowed: PDF, JPG, PNG</div>
                                            <span x-show="documents.aadhar" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" style="font-size: 0.72rem; display: none;">
                                                <i class="bi bi-file-earmark-check-fill me-1"></i>Current: <span x-text="documents.aadhar?.name"></span>
                                            </span>
                                        </div>
                                        <div x-show="documents.aadhar" x-transition.opacity style="display: none;" class="mt-2 p-2 rounded border bg-light" :class="!aadhaarConsent ? 'border-warning border-opacity-50' : 'border-success border-opacity-25'">
                                            <div class="form-check d-flex gap-2 mb-0">
                                                <input class="form-check-input flex-shrink-0 mt-1" type="checkbox" id="aadhaarConsentCheck" x-model="aadhaarConsent" style="cursor: pointer; width: 1.1em; height: 1.1em;">
                                                <label class="form-check-label text-muted" for="aadhaarConsentCheck" style="font-size: 0.72rem; line-height: 1.4; cursor: pointer;">
                                                    I hereby give my consent to Delhi Metro Rail Corporation to collect, use, and store my Aadhaar number/Virtual ID and biometric/OTP data for the purpose of identity verification, e-KYC, and authentication as per the Aadhaar Act and applicable regulations.
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">College ID<span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf" @change="handleFileUpload($event, 'college_id')">
                                            <button type="button" class="btn btn-outline-primary px-3 flex-shrink-0" x-show="documents.college_id" @click="previewDocument('college_id')" title="Preview Document"><i class="bi bi-eye-fill"></i></button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-1">
                                            <div class="form-text mb-0" style="font-size: 0.72rem;">Max 5MB • Allowed: PDF, JPG, PNG</div>
                                            <span x-show="documents.college_id" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" style="font-size: 0.72rem; display: none;">
                                                <i class="bi bi-file-earmark-check-fill me-1"></i>Current: <span x-text="documents.college_id?.name"></span>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Letter of Recommendation<span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf" @change="handleFileUpload($event, 'lor')">
                                            <button type="button" class="btn btn-outline-primary px-3 flex-shrink-0" x-show="documents.lor" @click="previewDocument('lor')" title="Preview Document"><i class="bi bi-eye-fill"></i></button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-1">
                                            <div class="form-text mb-0" style="font-size: 0.72rem;">Max 5MB • Allowed: PDF, JPG, PNG</div>
                                            <span x-show="documents.lor" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" style="font-size: 0.72rem; display: none;">
                                                <i class="bi bi-file-earmark-check-fill me-1"></i>Current: <span x-text="documents.lor?.name"></span>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="divider-line my-3"></div>
                                    <h3 class="h6 fw-bold text-secondary mb-2 mt-0">Visual Identification</h3>
                                    <div class="col-md-6">
                                        <label class="form-label">Passport Size Photograph<span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png" @change="handleFileUpload($event, 'photograph')">
                                            <button type="button" class="btn btn-outline-primary px-3 flex-shrink-0" x-show="documents.photograph" @click="previewDocument('photograph')" title="Preview Image"><i class="bi bi-eye-fill"></i></button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-1">
                                            <div class="form-text mb-0" style="font-size: 0.72rem;">Max 5MB • <strong class="text-dark">Allowed: JPG, PNG ONLY</strong></div>
                                            <span x-show="documents.photograph" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" style="font-size: 0.72rem; display: none;">
                                                <i class="bi bi-file-earmark-check-fill me-1"></i>Current: <span x-text="documents.photograph?.name"></span>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Signature<span class="text-danger">*</span></label>
                                        <div class="d-flex gap-2">
                                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png" @change="handleFileUpload($event, 'signature')">
                                            <button type="button" class="btn btn-outline-primary px-3 flex-shrink-0" x-show="documents.signature" @click="previewDocument('signature')" title="Preview Image"><i class="bi bi-eye-fill"></i></button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-1">
                                            <div class="form-text mb-0" style="font-size: 0.72rem;">Max 5MB • <strong class="text-dark">Allowed: JPG, PNG ONLY</strong></div>
                                            <span x-show="documents.signature" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25" style="font-size: 0.72rem; display: none;">
                                                <i class="bi bi-file-earmark-check-fill me-1"></i>Current: <span x-text="documents.signature?.name"></span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- STEP 4 -->
                            <div x-show="currentStep === 4" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform translate-x-4">
                                <div class="mb-4">
                                    <h2 class="h5 fw-bold mb-1">Internship Details</h2>
                                    <p class="text-muted small">Define placement parameters mapping to operational capacities.</p>
                                </div>
                                <div class="row g-4 mb-4">
                                    <div class="col-md-4">
                                        <label class="form-label">Target Department<span class="text-danger">*</span></label>
                                        <select class="form-select" x-model="placement.department_id">
                                            <option value="">Select Department</option>
                                            <template x-for="dept in dmrcDepartments"><option :value="dept" x-text="dept"></option></template>
                                        </select>
                                        
                                        <!-- Real-time Capacity Counter with Negative Value Visibility and Badge Alignment -->
                                        <div x-show="placement.department_id && selectedDeptCapacity" x-transition.opacity style="display: none;" class="mt-2 p-2 rounded-3 border" :class="isWaitlisted ? 'bg-danger bg-opacity-10 border-danger border-opacity-25' : 'bg-light border-secondary border-opacity-10'">
                                            <div class="d-flex justify-content-between align-items-center" style="font-size: 0.75rem;">
                                                <span class="text-muted fw-bold">Max Seats: <span class="text-dark" x-text="selectedDeptCapacity?.max"></span></span>
                                                <div class="fw-bold d-flex align-items-center gap-1" :class="isWaitlisted ? 'text-danger' : 'text-success'">
                                                    <span>Availability:</span>
                                                    <span x-text="selectedDeptCapacity?.max - selectedDeptCapacity?.occ"></span>
                                                    <template x-if="isWaitlisted">
                                                        <span class="badge bg-danger ms-1" style="font-size: 0.6rem; padding: 3px 6px;">Waitlist</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Internship Duration<span class="text-danger">*</span></label>
                                        <select class="form-select" x-model="placement.duration_weeks">
                                            <option value="">Select Duration</option><option value="4">4 Weeks (1 Month)</option><option value="6">6 Weeks (1.5 Months)</option><option value="8">8 Weeks (2 Months)</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Preferred Date of Joining<span class="text-danger">*</span></label>
                                        <input type="text" class="form-control bg-white" x-model="placement.requested_doj" readonly x-init="initDOJCalendar($el)" placeholder="Select allowed date" style="cursor: pointer;">
                                    </div>
                                </div>
                                <div class="card bg-light border-0 rounded-4 overflow-hidden mt-2">
                                    <div class="p-3 bg-secondary bg-opacity-10 border-bottom border-secondary border-opacity-10 d-flex align-items-center gap-2">
                                        <i class="bi bi-shield-lock-fill text-secondary"></i><span class="fw-bold text-dark" style="font-size: 0.85rem;">Internal Referrer Authorization</span>
                                    </div>
                                    <div class="p-4">
                                        <div class="row g-3">
                                            <div class="col-md-3"><label class="form-label text-muted">Employee ID</label><input type="text" class="form-control bg-white text-muted fw-medium" :value="sessionEmployee.empId" disabled readonly></div>
                                            <div class="col-md-3"><label class="form-label text-muted">Referrer Name</label><input type="text" class="form-control bg-white text-muted fw-medium" :value="sessionEmployee.name" disabled readonly></div>
                                            <div class="col-md-3"><label class="form-label text-muted">Designation</label><input type="text" class="form-control bg-white text-muted fw-medium" :value="sessionEmployee.designation" disabled readonly></div>
                                            <div class="col-md-3"><label class="form-label text-muted">Department</label><input type="text" class="form-control bg-white text-muted fw-medium" :value="sessionEmployee.department" disabled readonly></div>
                                            <div class="col-12 mt-4">
                                                <div class="form-check form-switch p-3 rounded-3 border bg-white d-flex align-items-center gap-3" :class="placement.is_ward ? 'border-primary bg-primary bg-opacity-10' : 'border-light'">
                                                    <input class="form-check-input m-0" type="checkbox" role="switch" id="wardCheck" x-model="placement.is_ward" style="width: 2.5em; height: 1.25em; cursor: pointer;">
                                                    <label class="form-check-label fw-medium w-100 mt-1" for="wardCheck" style="cursor: pointer; font-size: 0.9rem;">Applicant is my direct ward/child</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- STEP 5 -->
                            <div x-show="currentStep === 5" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform translate-x-4">
                                <div class="mb-4">
                                    <h2 class="h5 fw-bold mb-1">Review &amp; Final Lock Submission</h2>
                                    <p class="text-muted small">Verify every section, accept the declarations, and lock the application for HR verification.</p>
                                </div>
                                <div x-show="!isReadyToSubmit" x-transition.opacity class="rounded-4 p-3 mb-4" style="background-color: #FDECEE; border: 1px solid rgba(201, 20, 44, 0.25); color: var(--dmrc-crimson);">
                                    <div class="d-flex align-items-center gap-2 fw-bold mb-2" style="font-size: 0.88rem;"><i class="bi bi-x-octagon-fill"></i> Submission blocked — mandatory items are missing</div>
                                    <template x-for="group in missingByStep" :key="group.step">
                                        <div class="mb-2">
                                            <div class="fw-bold text-uppercase" style="font-size: 0.68rem; letter-spacing: 0.04em; opacity: 0.8;" x-text="'Step ' + group.step + ' · ' + group.title"></div>
                                            <div class="d-flex flex-wrap gap-2 mt-1">
                                                <template x-for="item in group.items" :key="item"><button type="button" class="missing-link" @click="goToStep(group.step)" x-text="item"></button></template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="text-muted fw-medium" style="font-size: 0.78rem;"><i class="bi bi-list-check me-1"></i>Review all 4 sections below.</span>
                                    <button type="button" class="btn btn-link p-0 fw-bold text-decoration-none" style="font-size: 0.78rem; color: var(--dmrc-blue);" @click="setAllSections(!allSectionsOpen)" x-text="allSectionsOpen ? 'Collapse All' : 'Expand All'"></button>
                                </div>
                                
                                <div class="review-accordion mb-2">
                                    <button type="button" class="review-head" @click="toggleSection(1)"><span class="rev-badge">1</span><span class="fw-bold">Student Details</span><span class="chip ms-auto" :class="isSectionComplete(1) ? 'chip-complete' : 'chip-incomplete'" x-text="isSectionComplete(1) ? 'Complete' : 'Incomplete'"></span><i class="bi bi-chevron-down rev-chevron" :class="reviewSections[1] ? 'open' : ''"></i></button>
                                    <div class="review-body" x-show="reviewSections[1]" x-transition.opacity.duration.150ms>
                                        <div class="rev-row"><span class="rev-label">Full Name</span><span class="rev-value" x-text="displayValue(student.fullName)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Father's Name</span><span class="rev-value" x-text="displayValue(student.fathersName)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Gender</span><span class="rev-value" x-text="displayValue(student.gender)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Date of Birth</span><span class="rev-value" x-text="displayDate(student.dateOfBirth)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Mobile Number</span><span class="rev-value" x-text="displayValue(student.mobile_number)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Email ID</span><span class="rev-value" x-text="displayValue(student.personal_email)"></span></div>
                                    </div>
                                </div>
                                <div class="review-accordion mb-2">
                                    <button type="button" class="review-head" @click="toggleSection(2)"><span class="rev-badge">2</span><span class="fw-bold">Academic Matrix</span><span class="chip ms-auto" :class="isSectionComplete(2) ? 'chip-complete' : 'chip-incomplete'" x-text="isSectionComplete(2) ? 'Complete' : 'Incomplete'"></span><i class="bi bi-chevron-down rev-chevron" :class="reviewSections[2] ? 'open' : ''"></i></button>
                                    <div class="review-body" x-show="reviewSections[2]" x-transition.opacity.duration.150ms>
                                        <div class="rev-row"><span class="rev-label">University</span><span class="rev-value" x-text="displayValue(academic.university_name)"></span></div>
                                        <div class="rev-row"><span class="rev-label">Course</span><span class="rev-value" x-text="displayValue(displayCourse())"></span></div>
                                        <div class="rev-row"><span class="rev-label">Score</span><span class="rev-value" x-text="displayValue(displayScore())"></span></div>
                                    </div>
                                </div>
                                <div class="review-accordion mb-2">
                                    <button type="button" class="review-head" @click="toggleSection(3)"><span class="rev-badge">3</span><span class="fw-bold">Document Vault</span><span class="chip ms-auto" :class="isSectionComplete(3) ? 'chip-complete' : 'chip-incomplete'" x-text="getUploadedCount() + '/5 Uploaded'"></span><i class="bi bi-chevron-down rev-chevron" :class="reviewSections[3] ? 'open' : ''"></i></button>
                                    <div class="review-body" x-show="reviewSections[3]" x-transition.opacity.duration.150ms>
                                        <template x-for="pair in Object.entries(documentLabels)" :key="pair[0]">
                                            <div class="rev-row">
                                                <span class="rev-label" x-text="pair[1]"></span>
                                                <span class="rev-value">
                                                    <template x-if="documents[pair[0]]">
                                                        <span class="d-inline-flex align-items-center gap-2"><i class="bi bi-file-earmark-check-fill" style="color: var(--dmrc-emerald);"></i><span class="text-truncate" style="max-width: 200px;" x-text="documents[pair[0]].name"></span><button type="button" class="btn-eye" @click="previewDocument(pair[0])"><i class="bi bi-eye-fill"></i></button></span>
                                                    </template>
                                                    <template x-if="!documents[pair[0]]"><span class="chip chip-incomplete">Missing</span></template>
                                                </span>
                                            </div>
                                        </template>
                                        <template x-if="documents.aadhar">
                                            <div class="rev-row mt-2 rounded" style="background-color: #F8FAFC; padding: 8px 12px; border: 1px solid #E2E8F0;">
                                                <span class="rev-label text-success" style="font-size: 0.75rem;"><i class="bi bi-shield-check me-1"></i>Aadhaar Consent</span><span class="rev-value text-success" style="font-size: 0.75rem;">Provided</span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                                <div class="review-accordion mb-2">
                                    <button type="button" class="review-head" @click="toggleSection(4)"><span class="rev-badge">4</span><span class="fw-bold">Internship Details</span><span class="chip ms-auto" :class="isSectionComplete(4) ? 'chip-complete' : 'chip-incomplete'" x-text="isSectionComplete(4) ? 'Complete' : 'Incomplete'"></span><i class="bi bi-chevron-down rev-chevron" :class="reviewSections[4] ? 'open' : ''"></i></button>
                                    <div class="review-body" x-show="reviewSections[4]" x-transition.opacity.duration.150ms>
                                        <div class="rev-row"><span class="rev-label">Target Dept</span><span class="rev-value" x-text="displayValue(placement.department_id)"></span></div>
                                        <div class="rev-row"><span class="rev-label">DOJ</span><span class="rev-value" x-text="displayDate(placement.requested_doj)"></span></div>
                                    </div>
                                </div>
                                
                                <!-- Final Declarations Text -->
                                <div class="card bg-light border-0 rounded-4 overflow-hidden mt-4" :class="!isReadyToSubmit ? 'decl-locked' : ''">
                                    <div class="p-3 bg-secondary bg-opacity-10 border-bottom border-secondary border-opacity-10 d-flex align-items-center gap-2"><i class="bi bi-shield-fill-check text-secondary"></i><span class="fw-bold text-dark" style="font-size: 0.85rem;">Final Declarations</span></div>
                                    <div class="p-4">
                                        <p class="fw-bold mb-3" style="font-size: 0.85rem;">By submitting this application, I formally declare:</p>
                                        <ul class="mb-4 ps-3 d-flex flex-column gap-2" style="font-size: 0.82rem; line-height: 1.5;">
                                            <li><strong>Information Accuracy:</strong> All information, academic data, and uploaded documents provided in this referral application are true, complete, and accurate to the best of my knowledge.</li>
                                            <li><strong>Bonafide Status:</strong> The applicant is a bonafide student currently enrolled in the declared academic institution and program.</li>
                                            <li><strong>Exclusivity:</strong> The applicant is not currently employed, nor engaged in any other full-time internship or professional training assignment that would conflict with this program.</li>
                                            <li><strong>Compliance:</strong> I understand and will ensure the applicant strictly adheres to all standard operating procedures, safety guidelines, and the code of conduct as outlined in the <a href="https://www.delhimetrorail.com" target="_blank" rel="noopener" class="fw-bold" style="color: var(--dmrc-blue);">Official DMRC Policies &amp; Rules</a>.</li>
                                        </ul>
                                        <div class="form-check p-3 rounded-3 border bg-white d-flex align-items-center gap-2" :class="acceptedDeclarations ? 'border-primary bg-primary bg-opacity-10' : 'border-light'">
                                            <input class="form-check-input ms-0 mt-0" type="checkbox" id="declCheck" x-model="acceptedDeclarations" :disabled="!isReadyToSubmit" style="width: 1.25em; height: 1.25em; cursor: pointer;">
                                            <label class="form-check-label fw-medium w-100" for="declCheck" style="cursor: pointer; font-size: 0.9rem;">I have read and agree to all declarations.</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm p-3 mt-3 rounded-4 bg-white d-flex flex-row align-items-center justify-content-between">
                            <button type="button" class="btn btn-outline-secondary px-4 py-2" style="font-size: 0.88rem; font-weight: 600;" @click="prevStep()" x-show="currentStep > 1"><i class="bi bi-arrow-left me-2"></i> Save & Back</button>
                            <div x-show="currentStep === 1"></div>
                            <button type="button" class="btn btn-primary px-4 py-2 ms-auto" style="font-size: 0.88rem; font-weight: 600; background-color: var(--dmrc-blue); border-color: var(--dmrc-blue);" @click="nextStep()" x-show="currentStep < totalSteps">Save & Next <i class="bi bi-arrow-right ms-2"></i></button>
                            <button type="button" class="btn btn-dmrc-primary px-4 py-2 ms-auto" style="font-size: 0.88rem; font-weight: 600;" x-show="currentStep === totalSteps" :disabled="!canSubmit" @click="requestSubmit()"><i class="bi bi-lock-fill me-2"></i> Submit Application</button>
                        </div>
                    </div>

                    <!-- Right Column Ticket -->
                    <div class="col-lg-4">
                        <div class="sticky-top" style="top: 20px; z-index: 10;">
                            <div class="card border-0 rounded-4 overflow-hidden shadow" style="box-shadow: var(--shadow-ticket) !important;">
                                <div class="p-3 text-white" style="background: linear-gradient(135deg, var(--dmrc-blue), var(--dmrc-blue-dark));">
                                    <div class="text-uppercase tracking-wider fw-medium" style="font-size: 0.65rem; letter-spacing: 0.08em; opacity: 0.85;">Operational Ticket Record</div>
                                    <div class="fw-bold mt-1" style="font-family: var(--font-display); font-size: 1rem;" x-text="applicationCode"></div>
                                </div>
                                <div class="bg-white px-3 pt-3 pb-2 border-top border-4 border-light">
                                    <div class="d-flex justify-content-between border-bottom pb-2 mb-2" style="font-size: 0.82rem;"><span class="text-muted">Target Cycle</span><span class="fw-bold text-dark text-end" x-text="placement.sessionTerm ? placement.sessionTerm + ' 2026' : '—'"></span></div>
                                    <div class="d-flex justify-content-between border-bottom pb-2 mb-2" style="font-size: 0.82rem;"><span class="text-muted">Candidate</span><span class="fw-bold text-dark text-end" x-text="student.fullName || '—'"></span></div>
                                    <div class="d-flex justify-content-between border-bottom pb-2 mb-2" style="font-size: 0.82rem;"><span class="text-muted">Target Dept.</span><span class="fw-bold text-dark text-end" x-text="placement.department_id || '—'"></span></div>
                                    <div class="d-flex justify-content-between border-bottom pb-2 mb-2" style="font-size: 0.82rem;"><span class="text-muted">Vault Status</span><span class="fw-bold text-dark text-end" :class="getUploadedCount() === 5 ? 'text-success' : 'text-warning'" x-text="getUploadedCount() + '/5 Uploaded'"></span></div>
                                    <div class="text-center py-2 my-2 rounded-pill fw-bold" style="font-size: 0.72rem; background-color: var(--dmrc-blue-soft); color: var(--dmrc-blue);">RECORD STATUS: TRANSACTION DRAFT</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <template x-if="portalState === 'submitted'">
        <div class="container-xl py-5 my-4 d-flex justify-content-center" x-transition>
            <div class="card border-0 shadow-lg rounded-4 p-5 text-center" style="max-width: 560px; width: 100%;">
                <div class="success-check mx-auto mb-4"><i class="bi bi-check-lg"></i></div>
                <h1 class="h3 fw-bold mb-2" style="font-family: var(--font-display);">Thank You!</h1>
                <p class="text-muted mb-4">The referral application has been submitted successfully and is now locked for HR verification.</p>
                <div class="rounded-4 p-3 mb-3" style="background-color: var(--dmrc-blue-soft);">
                    <div class="text-uppercase fw-medium" style="font-size: 0.65rem; letter-spacing: 0.08em; color: var(--dmrc-blue); opacity: 0.85;">Application Ticket ID</div>
                    <div class="fw-bold mt-1" style="font-family: var(--font-display); font-size: 1.45rem; color: var(--dmrc-blue); letter-spacing: 0.02em;" x-text="finalTicket"></div>
                </div>
                <div class="d-flex justify-content-center mb-4">
                    <span class="status-pill d-inline-flex align-items-center gap-2"><i class="bi bi-hourglass-split"></i> Status: Submitted · Approval Pending</span>
                </div>
                <button type="button" class="btn btn-dmrc-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold mx-auto" @click="returnToDashboard()">
                    <i class="bi bi-grid-fill me-2"></i> Return to Dashboard
                </button>
            </div>
        </div>
    </template>

    <!-- SLIDE-OUT OFFCANVAS DRAWER FOR TICKET PREVIEWS -->
    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="ticketDrawer" style="width: 500px; max-width: 100vw; border-left: 0;">
        <div class="offcanvas-header bg-light border-bottom p-4">
            <div>
                <h5 class="offcanvas-title fw-bold" style="font-family: var(--font-display);" x-text="selectedDrawerApp ? (selectedDrawerApp.student.fullName || 'Draft Candidate') : ''"></h5>
                <div class="text-muted small mt-1" style="font-family: var(--font-display); color: var(--dmrc-blue) !important; font-weight: 700;" x-text="selectedDrawerApp ? selectedDrawerApp.ticketId : ''"></div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0 bg-white">
            <template x-if="selectedDrawerApp">
                <div>
                    <!-- Status Header -->
                    <div class="p-4 border-bottom d-flex align-items-center justify-content-between" style="background-color: #F8FAFC;">
                        <span class="text-muted fw-bold" style="font-size: 0.75rem; text-transform: uppercase;">Current Status</span>
                        <div class="text-end">
                            <span class="badge" :class="selectedDrawerApp.badge" style="padding: 6px 12px; font-size: 0.8rem;" x-text="selectedDrawerApp.dbStatus || selectedDrawerApp.status"></span>
                            <template x-if="selectedDrawerApp.timeline && selectedDrawerApp.timeline.some(e => e.title.includes('Resubmitted'))">
                                <div class="mt-1">
                                    <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25" style="font-size: 0.65rem;">
                                        <i class="bi bi-arrow-repeat me-1"></i>Resubmitted
                                    </span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <template x-if="selectedDrawerApp.timeline && selectedDrawerApp.timeline.length > 0">
                        <div class="p-4 border-bottom">
                            <h6 class="fw-bold mb-3" style="font-size: 0.85rem; color: var(--dmrc-blue);"><i class="bi bi-clock-history me-2"></i>Status Timeline</h6>
                            <div class="drawer-timeline mt-3">
                                <template x-for="event in selectedDrawerApp.timeline" :key="event.title + event.date">
                                    <div class="drawer-timeline-item">
                                        <div class="drawer-timeline-date" x-text="event.date"></div>
                                        <div class="drawer-timeline-title" x-text="event.title"></div>
                                        <div class="drawer-timeline-desc" x-show="event.desc" x-text="event.desc"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Application Review Summary -->
                    <div class="p-4 pb-5">
                        <h6 class="fw-bold mb-3" style="font-size: 0.85rem; color: var(--dmrc-blue);"><i class="bi bi-file-text me-2"></i>Application Data</h6>
                        
                        <!-- Bio -->
                        <div class="review-accordion mb-2">
                            <button type="button" class="review-head"><span class="fw-bold">Student Details</span></button>
                            <div class="review-body">
                                <div class="rev-row"><span class="rev-label">Full Name</span><span class="rev-value" x-text="displayValue(selectedDrawerApp.student.fullName)"></span></div>
                                <div class="rev-row"><span class="rev-label">Email ID</span><span class="rev-value" x-text="displayValue(selectedDrawerApp.student.personal_email)"></span></div>
                                <div class="rev-row"><span class="rev-label">Mobile Number</span><span class="rev-value" x-text="displayValue(selectedDrawerApp.student.mobile_number)"></span></div>
                            </div>
                        </div>
                        
                        <!-- Academic -->
                        <div class="review-accordion mb-2">
                            <button type="button" class="review-head"><span class="fw-bold">Academic Matrix</span></button>
                            <div class="review-body">
                                <div class="rev-row"><span class="rev-label">University</span><span class="rev-value" x-text="displayValue(selectedDrawerApp.academic.university_name)"></span></div>
                                <div class="rev-row"><span class="rev-label">Course</span><span class="rev-value" x-text="displayCourse(selectedDrawerApp.academic)"></span></div>
                                <div class="rev-row"><span class="rev-label">Score</span><span class="rev-value" x-text="displayScore(selectedDrawerApp.academic)"></span></div>
                            </div>
                        </div>

                        <!-- Documents -->
                        <div class="review-accordion mb-2">
                            <button type="button" class="review-head"><span class="fw-bold">Document Vault</span><span class="chip chip-complete ms-auto" x-text="getDrawerUploadedCount() + '/5'"></span></button>
                            <div class="review-body">
                                <template x-for="pair in Object.entries(documentLabels)" :key="pair[0]">
                                    <div class="rev-row">
                                        <span class="rev-label" x-text="pair[1]"></span>
                                        <span class="rev-value">
                                            <template x-if="selectedDrawerApp.documents[pair[0]]">
                                                <span class="d-inline-flex align-items-center gap-2"><i class="bi bi-file-earmark-check-fill" style="color: var(--dmrc-emerald);"></i><span class="text-truncate" style="max-width: 150px;" x-text="selectedDrawerApp.documents[pair[0]].name"></span><button type="button" class="btn-eye" @click="previewDrawerDocument(selectedDrawerApp.documents[pair[0]])"><i class="bi bi-eye-fill"></i></button></span>
                                            </template>
                                        </span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Placement -->
                        <div class="review-accordion mb-2">
                            <button type="button" class="review-head"><span class="fw-bold">Internship Details</span></button>
                            <div class="review-body">
                                <div class="rev-row"><span class="rev-label">Target Dept</span><span class="rev-value" x-text="displayValue(selectedDrawerApp.dept)"></span></div>
                                <div class="rev-row"><span class="rev-label">DOJ</span><span class="rev-value" x-text="displayDate(selectedDrawerApp.doj)"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
